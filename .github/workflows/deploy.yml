name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 88.99.121.53
          username: root
          key: ${{ secrets.TELTONIKA_DEPLOY_SSH_KEY }}
          # De deploy-key op de server staat vast aan een forced command
          # (~/.ssh/authorized_keys -> /var/teltonika-server/deploy.sh), dus
          # wat hier staat is puur documentatie/fallback als die restrictie
          # ooit verdwijnt - het daadwerkelijke commando wordt door de server
          # afgedwongen, niet door deze regel.
          script: /var/teltonika-server/deploy.sh
